name: Nocny backup Firebase

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout backup repo
        uses: actions/checkout@v4
        with:
          repository: wasikkamil-art/vbs-stat-backups
          token: ${{ secrets.BACKUP_TOKEN }}
          path: backup-repo

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase Admin
        run: npm install firebase-admin

      - name: Run backup
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          node << 'SCRIPT'
          const admin = require('firebase-admin');
          const fs = require('fs');

          const serviceAccount = JSON.parse(process.env.FIREBASE_SA);
          admin.initializeApp({ credential: admin.credential.cert(serviceAccount) });

          const db = admin.firestore();

          async function backup() {
            const snap = await db.doc('fleet/data').get();
            const data = snap.data() || {};
            const date = new Date().toISOString().slice(0, 10);

            fs.mkdirSync('backup-repo/backups', { recursive: true });
            fs.writeFileSync(
              `backup-repo/backups/${date}.json`,
              JSON.stringify(data, null, 2)
            );

            const stats = {
              date,
              vehicles: (data.fleetv2_vehicles || []).length,
              costs:    (data.fleetv2_costs    || []).length,
              frachty:  (data.fleetv2_frachty  || []).length,
              docs:     (data.fleetv2_docs      || []).length,
            };
            console.log('Backup OK:', JSON.stringify(stats));
            fs.writeFileSync('backup-repo/latest.json', JSON.stringify(stats, null, 2));
          }

          backup().catch(e => { console.error(e); process.exit(1); });
          SCRIPT

      - name: Commit backup
        run: |
          cd backup-repo
          git config user.name "VBS-Stat Backup Bot"
          git config user.email "backup@vbs-stat.app"
          git add .
          DATE=$(date +%Y-%m-%d)
          git diff --staged --quiet || git commit -m "Backup $DATE"
          git push
