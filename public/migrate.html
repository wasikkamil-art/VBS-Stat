<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>FleetStat — Migracja Timestampów</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 700px; width: 95%; padding: 32px; }
    h1 { font-size: 20px; color: #1e293b; margin-bottom: 8px; }
    .subtitle { color: #64748b; font-size: 14px; margin-bottom: 24px; }
    button { padding: 12px 24px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-google { background: #4285f4; color: #fff; }
    .btn-google:hover:not(:disabled) { background: #3367d6; }
    .btn-dry { background: #f59e0b; color: #fff; margin-right: 12px; }
    .btn-dry:hover:not(:disabled) { background: #d97706; }
    .btn-run { background: #22c55e; color: #fff; }
    .btn-run:hover:not(:disabled) { background: #16a34a; }
    .actions { display: flex; gap: 12px; margin-top: 16px; }
    #log { background: #0f172a; color: #e2e8f0; border-radius: 10px; padding: 16px; margin-top: 20px; font-family: 'SF Mono', Menlo, monospace; font-size: 12px; line-height: 1.6; max-height: 500px; overflow-y: auto; white-space: pre-wrap; display: none; }
    .status { margin-top: 12px; padding: 10px 16px; border-radius: 8px; font-size: 13px; display: none; }
    .status.info { background: #eff6ff; color: #1d4ed8; display: block; }
    .status.success { background: #f0fdf4; color: #15803d; display: block; }
    .status.error { background: #fef2f2; color: #dc2626; display: block; }
    .user-info { background: #f0fdf4; color: #15803d; padding: 10px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔄 FleetStat — Migracja Timestampów</h1>
    <p class="subtitle">Konwertuje Firestore Timestamp → ISO string w chatRooms i messages</p>

    <div id="loginSection">
      <button class="btn-google" id="loginBtn" onclick="doLogin()">🔐 Zaloguj się przez Google</button>
    </div>

    <div id="userInfo" class="user-info" style="display:none"></div>

    <div id="actionSection" style="display:none">
      <div class="actions">
        <button class="btn-dry" id="dryBtn" onclick="runMigration(true)">👀 Dry Run (podgląd)</button>
        <button class="btn-run" id="runBtn" onclick="runMigration(false)">🚀 Uruchom migrację</button>
      </div>
    </div>

    <div id="status" class="status"></div>
    <pre id="log"></pre>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, writeBatch, Timestamp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBJ_1_i_OS3DQ7g0hjJyF6ZTgU9_7LkHcQ",
      authDomain: "vbs-stats.firebaseapp.com",
      projectId: "vbs-stats",
      storageBucket: "vbs-stats.firebasestorage.app",
      messagingSenderId: "331217061974",
      appId: "1:331217061974:web:375c8931f0cda74ec413f7",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const logEl = document.getElementById("log");
    const statusEl = document.getElementById("status");

    function log(msg) {
      logEl.style.display = "block";
      logEl.textContent += msg + "\n";
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = "status " + type;
    }

    function isFirestoreTimestamp(val) {
      if (!val || typeof val !== "object") return false;
      return (val instanceof Timestamp)
        || (typeof val.seconds === "number" && typeof val.nanoseconds === "number")
        || (typeof val.toDate === "function");
    }

    function toISO(val) {
      if (typeof val.toDate === "function") return val.toDate().toISOString();
      if (typeof val.seconds === "number") {
        return new Date(val.seconds * 1000 + (val.nanoseconds || 0) / 1e6).toISOString();
      }
      return null;
    }

    // Expose to global scope for onclick
    window.doLogin = async function() {
      try {
        document.getElementById("loginBtn").disabled = true;
        document.getElementById("loginBtn").textContent = "Logowanie...";
        const result = await signInWithPopup(auth, provider);
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("userInfo").style.display = "block";
        document.getElementById("userInfo").textContent = `✅ Zalogowano: ${result.user.email}`;
        document.getElementById("actionSection").style.display = "block";
      } catch (e) {
        setStatus("Błąd logowania: " + e.message, "error");
        document.getElementById("loginBtn").disabled = false;
        document.getElementById("loginBtn").textContent = "🔐 Zaloguj się przez Google";
      }
    };

    window.runMigration = async function(dryRun) {
      document.getElementById("dryBtn").disabled = true;
      document.getElementById("runBtn").disabled = true;
      logEl.textContent = "";

      const mode = dryRun ? "DRY RUN (bez zapisu)" : "PRODUKCJA (zapis!)";
      log("=".repeat(55));
      log(`  MIGRACJA TIMESTAMPÓW — ${mode}`);
      log("=".repeat(55) + "\n");

      let totalRooms = 0, totalMessages = 0, migratedMessages = 0, migratedRoomFields = 0;

      try {
        setStatus("Pobieram pokoje czatu...", "info");
        const roomsSnap = await getDocs(collection(db, "chatRooms"));
        totalRooms = roomsSnap.size;
        log(`📦 Znaleziono ${totalRooms} pokojów czatu\n`);

        for (const roomDoc of roomsSnap.docs) {
          const roomId = roomDoc.id;
          const roomData = roomDoc.data();
          const roomName = roomData.name || roomId;
          const roomUpdates = {};

          // lastMessageAt
          if (isFirestoreTimestamp(roomData.lastMessageAt)) {
            const iso = toISO(roomData.lastMessageAt);
            roomUpdates.lastMessageAt = iso;
            log(`  🔄 [${roomName}] lastMessageAt: Timestamp → ${iso}`);
          }

          // lastRead map
          if (roomData.lastRead && typeof roomData.lastRead === "object") {
            for (const [uid, val] of Object.entries(roomData.lastRead)) {
              if (isFirestoreTimestamp(val)) {
                const iso = toISO(val);
                roomUpdates[`lastRead.${uid}`] = iso;
                log(`  🔄 [${roomName}] lastRead.${uid}: Timestamp → ${iso}`);
              }
            }
          }

          // typing map
          if (roomData.typing && typeof roomData.typing === "object") {
            for (const [uid, val] of Object.entries(roomData.typing)) {
              if (isFirestoreTimestamp(val)) {
                const iso = toISO(val);
                roomUpdates[`typing.${uid}`] = iso;
                log(`  🔄 [${roomName}] typing.${uid}: Timestamp → ${iso}`);
              }
            }
          }

          if (Object.keys(roomUpdates).length > 0) {
            migratedRoomFields += Object.keys(roomUpdates).length;
            if (!dryRun) {
              await updateDoc(doc(db, "chatRooms", roomId), roomUpdates);
            }
          }

          // Messages
          setStatus(`Skanuję pokój: ${roomName}...`, "info");
          const messagesSnap = await getDocs(collection(db, "chatRooms", roomId, "messages"));
          totalMessages += messagesSnap.size;

          let roomMigrated = 0;
          let batch = writeBatch(db);
          let batchCount = 0;

          for (const msgDoc of messagesSnap.docs) {
            const msgData = msgDoc.data();

            if (isFirestoreTimestamp(msgData.timestamp)) {
              const iso = toISO(msgData.timestamp);
              if (!dryRun) {
                batch.update(doc(db, "chatRooms", roomId, "messages", msgDoc.id), { timestamp: iso });
                batchCount++;
              }
              roomMigrated++;
              migratedMessages++;

              if (batchCount >= 450) {
                if (!dryRun) {
                  await batch.commit();
                  batch = writeBatch(db);
                }
                batchCount = 0;
              }
            }
          }

          if (!dryRun && batchCount > 0) {
            await batch.commit();
          }

          if (roomMigrated > 0 || Object.keys(roomUpdates).length > 0) {
            log(`  ✅ [${roomName}] ${roomMigrated}/${messagesSnap.size} wiadomości, ${Object.keys(roomUpdates).length} pól pokoju`);
          } else {
            log(`  ⏭️  [${roomName}] ${messagesSnap.size} wiadomości — OK`);
          }
        }

        // Podsumowanie
        log("\n" + "=".repeat(55));
        log("  PODSUMOWANIE");
        log("=".repeat(55));
        log(`  Pokoje:              ${totalRooms}`);
        log(`  Wiadomości łącznie:  ${totalMessages}`);
        log(`  Wiadomości zmigr.:   ${migratedMessages}`);
        log(`  Pola pokojów zmigr.: ${migratedRoomFields}`);
        log(`  Tryb:                ${mode}`);
        log("=".repeat(55));

        if (dryRun && (migratedMessages > 0 || migratedRoomFields > 0)) {
          setStatus(`Dry run zakończony. Znaleziono ${migratedMessages} wiadomości i ${migratedRoomFields} pól do migracji. Kliknij "Uruchom migrację" żeby zapisać.`, "info");
        } else if (!dryRun && (migratedMessages > 0 || migratedRoomFields > 0)) {
          setStatus(`✅ Migracja zakończona! Zmieniono ${migratedMessages} wiadomości i ${migratedRoomFields} pól pokojów.`, "success");
        } else {
          setStatus("🎉 Brak Firestore Timestamps do migracji — wszystko jest już ISO string!", "success");
        }

      } catch (e) {
        log("\n❌ BŁĄD: " + e.message);
        setStatus("Błąd migracji: " + e.message, "error");
      }

      document.getElementById("dryBtn").disabled = false;
      document.getElementById("runBtn").disabled = false;
    };
  </script>
</body>
</html>
